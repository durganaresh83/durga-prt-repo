apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ha-app-hpa
  namespace: ha-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ha-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # avoid flapping - wait 5 min of low usage before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
