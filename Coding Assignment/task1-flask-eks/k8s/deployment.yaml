apiVersion: apps/v1
kind: Deployment
metadata:
  name: durga-prt-flask-app
  namespace: durga-prt-flask-app
  labels:
    app: durga-prt-flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: durga-prt-flask-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: durga-prt-flask-app
          image: REPLACE_WITH_ECR_IMAGE_URI:REPLACE_WITH_TAG
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
