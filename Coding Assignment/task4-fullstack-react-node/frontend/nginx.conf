server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the backend Service inside the cluster
    location /api/ {
        proxy_pass http://backend-svc:4000/api/;
    }

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
